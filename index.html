<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vouraikos Gorge | UNESCO Global Geopark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">

<style>
:root {
  --deep-night: #0C1117;
  --mist: #F1F1F1;
  --bronze: #A58A5B;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--deep-night); color: var(--mist); overflow-x: hidden; }

/* ===========================
   HEADER
=========================== */
header {
  position: fixed;
  width: 100%;
  padding: 30px 8%;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}
.logo { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; }
.logo span { color: var(--bronze); font-weight: 900; }

/* ===========================
   HERO SLIDESHOW
=========================== */
.hero-slideshow {
  position: relative;
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #000;
}

.gallery-track img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: fadeZoom 60s infinite;
}

/* Glass Panel Content - SLOW FADE IN */
.glass-panel {
  position: relative;
  z-index: 10;
  padding: 60px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  text-align: center;
  max-width: 800px;
  margin: 0 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  
  /* Start: Invisible & Smooth transition */
  opacity: 0;
  filter: blur(15px); /* Ξεκινάει πολύ θολό */
  transform: scale(1);transition: opacity 4.5s ease-in-out, filter 4s ease-in-out;

}

.glass-panel.active {
  opacity: 1;
  filter: blur(0px);
}

.glass-panel.exit {
  opacity: 0 !important;
  filter: blur(5px);
  transition: opacity 2.5s ease-in, filter 2.5s ease-in;
}

.glass-panel h1 {
  font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 300;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 20px;
  line-height: 1.1;
  color: white;
}

.glass-panel p {
  color: var(--bronze);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-size: 0.9rem;
}

/* ===========================
   FOOTER WITH SCRIM SHADOW
=========================== */
footer {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 50px 30px 30px; /* Περισσότερο padding πάνω για τη σκιά */
  text-align: center;
  z-index: 5;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.6); /* Ελαφρώς πιο έντονο για αναγνωσιμότητα */
  letter-spacing: 1px;
  /* Η σκιά προς τα πάνω (Scrim) */
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
}

/* Animation Delays για 10 εικόνες */
.gallery-track img:nth-child(1) { animation-delay: 0s; }
.gallery-track img:nth-child(2) { animation-delay: 6s; }
.gallery-track img:nth-child(3) { animation-delay: 12s; }
.gallery-track img:nth-child(4) { animation-delay: 18s; }
.gallery-track img:nth-child(5) { animation-delay: 24s; }
.gallery-track img:nth-child(6) { animation-delay: 30s; }
.gallery-track img:nth-child(7) { animation-delay: 36s; }
.gallery-track img:nth-child(8) { animation-delay: 42s; }
.gallery-track img:nth-child(9) { animation-delay: 48s; }
.gallery-track img:nth-child(10) { animation-delay: 54s; }

@keyframes fadeZoom {
  0%   { opacity: 0; transform: scale(1); }
  3%   { opacity: 1; }
  15%  { opacity: 1; }
  18%  { opacity: 0; transform: scale(1.05); }
  100% { opacity: 0; }
}
</style>
</head>

<body>

<header>
  <div class="logo">VOURAIKOS <span>UNESCO GLOBAL GEOPARK</span></div>
</header>

<section class="hero-slideshow">
  <div class="gallery-track">
    <img src="assets/photos/gallery_1/image_1.webp" alt="">
    <img src="assets/photos/gallery_1/image_2.webp" alt="">
    <img src="assets/photos/gallery_1/image_3.webp" alt="">
    <img src="assets/photos/gallery_1/image_4.webp" alt="">
    <img src="assets/photos/gallery_1/image_5.webp" alt="">
    <img src="assets/photos/gallery_1/image_6.webp" alt="">
    <img src="assets/photos/gallery_1/image_7.webp" alt="">
    <img src="assets/photos/gallery_1/image_8.webp" alt="">
    <img src="assets/photos/gallery_1/image_9.webp" alt="">
    <img src="assets/photos/gallery_1/image_10.webp" alt="">
  </div>

  <div class="glass-panel" id="mainPanel">
    <h1>Between Stone<br>and Silence</h1>
    <p>Chelmos-Vouraikos UNESCO Global Geopark</p>
  </div>
</section>

<footer>
  UNESCO Global Geopark © 2026 | Discover Diakopto Visual Archives | Spiritual Inspiration through Design
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const panel = document.getElementById("mainPanel");

  // Εμφάνιση (Slow Fade In)
  setTimeout(() => {
    panel.classList.add("active");
  }, 500);

  // Εξαφάνιση (Fade Out)
  setTimeout(() => {
    panel.classList.add("exit");
  }, 6000); // Αύξησα λίγο τον χρόνο για να προλάβει ο χρήστης να απολαύσει το αργό εφέ
});
</script>

</body>
</html>
